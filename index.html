<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MONITORING SISTEM CERDAS</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/raphael/2.3.0/raphael.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/justgage/1.4.1/justgage.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { background: #fff5f8; font-family: 'Segoe UI', sans-serif; text-align: center; padding: 20px; }
        .card { background: white; border-radius: 15px; padding: 15px; box-shadow: 0 4px 15px rgba(255, 192, 203, 0.3); margin: 10px auto; max-width: 1200px; border: 1px solid #ffe4e1; }
        .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; max-width: 1200px; margin: 0 auto; }
        .btn { padding: 10px 25px; border: none; border-radius: 25px; color: white; cursor: pointer; font-weight: bold; transition: 0.3s; margin: 5px; text-transform: uppercase; }
        .gauge { height: 160px; }
        canvas { max-height: 200px; width: 100% !important; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; font-size: 13px; }
        th { background: #ff69b4; color: white; padding: 12px; }
        td { padding: 10px; border-bottom: 1px solid #ffe4e1; }
        .badge { padding: 5px 10px; border-radius: 5px; color: white; font-weight: bold; }
        @media (max-width: 900px) { .grid { grid-template-columns: repeat(2, 1fr); } }
    </style>
</head>
<body>
    <h1 style="color: #ff1493;">🌸 MONITORING SISTEM CERDAS 🌸</h1>
    
    <div class="card">
        <button class="btn" style="background:#2ecc71" onclick="updateStatus('START')">▶ START</button>
        <button class="btn" style="background:#e74c3c" onclick="updateStatus('STOP')">■ STOP</button>
        <p id="statusLabel" style="font-weight: bold; color: #ff1493; margin-top: 10px;">STATUS: MENGHUBUNGKAN...</p>
    </div>

    <div class="grid">
        <div class="card"><div id="g1" class="gauge"></div><h5>DHT11 (°C)</h5></div>
        <div class="card"><div id="g2" class="gauge"></div><h5>DS18B20 (°C)</h5></div>
        <div class="card"><div id="g3" class="gauge"></div><h5>HUMIDITY (%)</h5></div>
        <div class="card"><div id="g4" class="gauge"></div><h5>GAS MQ-5 (PPM)</h5></div>
    </div>

    <div class="card">
        <div class="grid">
            <div class="card"><h5>Grafik Suhu</h5><canvas id="c1"></canvas></div>
            <div class="card"><h5>Grafik Gas & Hum</h5><canvas id="c2"></canvas></div>
        </div>
    </div>

    <div class="card">
        <h3>📜 DATA HISTORY</h3>
        <table>
            <thead>
                <tr><th>Waktu</th><th>DHT11</th><th>DS18B20</th><th>Hum</th><th>MQ-5</th><th>Sistem</th><th>Kondisi</th></tr>
            </thead>
            <tbody id="rows"></tbody>
        </table>
    </div>

    <script>
        const API = "https://script.google.com/macros/s/AKfycbyMzmdSyurOyb7bUFE7dbAFBCPYPzv3JBxwwAkT5VwbB2KBY8179c13rkHNk6JLbRRk/exec";
        let gauges = [], charts = [];

        window.onload = () => {
            gauges = [
                new JustGage({id:"g1", value:0, min:0, max:60, title:"DHT", symbol:"°C"}),
                new JustGage({id:"g2", value:0, min:0, max:60, title:"DS18", symbol:"°C"}),
                new JustGage({id:"g3", value:0, min:0, max:100, title:"Hum", symbol:"%"}),
                new JustGage({id:"g4", value:0, min:0, max:4000, title:"Gas", symbol:"ppm"})
            ];
            charts = [
                initChart('c1', 'DHT11', '#ff69b4'),
                initChart('c2', 'MQ-5', '#ffa500')
            ];
            setInterval(fetchData, 5000);
            fetchData();
        };

        function initChart(id, label, col) {
            return new Chart(document.getElementById(id), {
                type:'line', data:{ labels:[], datasets:[{ label:label, data:[], borderColor:col, fill:false }] }
            });
        }

        async function updateStatus(val) {
            document.getElementById('statusLabel').innerText = "MENGIRIM PERINTAH: " + val;
            try {
                // Gunakan mode no-cors agar request tidak diblokir browser
                await fetch(`${API}?action=${val.toLowerCase()}`, { mode: 'no-cors' });
                alert("Perintah " + val + " Terkirim!");
                setTimeout(fetchData, 1500);
            } catch (e) { alert("Error!"); }
        }

        async function fetchData() {
            try {
                const r = await fetch(API);
                const data = await r.json();
                
                // FILTER KRUSIAL: Membuang baris header dan data "Tahun 2026"
                const validData = data.filter(d => 
                    d[0] && d[0] !== "Waktu" && !isNaN(parseFloat(d[1])) && parseFloat(d[1]) < 100
                );

                if (validData.length === 0) return;
                const last = validData[validData.length - 1];

                // Update Gauges
                gauges[0].refresh(parseFloat(last[1]));
                gauges[1].refresh(parseFloat(last[2]));
                gauges[2].refresh(parseFloat(last[3]));
                gauges[3].refresh(parseFloat(last[4]));

                // Update Tabel
                document.getElementById('rows').innerHTML = validData.slice(-6).reverse().map(d => {
                    let warnaK = d[6] === "BAHAYA" ? "#e74c3c" : "#2ecc71";
                    let waktu = new Date(d[0]).toLocaleTimeString('id-ID');
                    return `<tr><td>${waktu}</td><td>${d[1]}</td><td>${d[2]}</td><td>${d[3]}</td><td>${d[4]}</td><td>${d[5]}</td><td><span class="badge" style="background:${warnaK}">${d[6]}</span></td></tr>`;
                }).join('');
                
                document.getElementById('statusLabel').innerText = "SISTEM: " + last[5];
            } catch(e) {}
        }
    </script>
</body>
</html>
